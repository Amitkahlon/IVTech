services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/ivtech
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      - mongo

volumes:
  mongo-data:
